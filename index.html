<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mızrak Akıllı Servis</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 5px solid #0056b3; border-radius: 10px; }
        .result-card { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .error-btn { display: block; width: 100%; padding: 10px; margin: 10px 0; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .mizrak-logo { font-size: 24px; font-weight: bold; color: #0056b3; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="mizrak-logo">MIZRAK AKILLI SERVİS</div>
    <div id="reader"></div>

    <div id="result" class="result-card">
        <h2 id="machine-name"></h2>
        <p><strong>Seri No:</strong> <span id="serial-no"></span></p>
        <p><strong>Durum:</strong> <span id="status"></span></p>
        <hr>
        <h3>Hata Kodları</h3>
        <button class="error-btn" onclick="alert('Teknik servis kaydı oluşturuldu: E01 - Motor Arızası')">E01 - Motor Isınma Hatası</button>
        <button class="error-btn" onclick="alert('Teknik servis kaydı oluşturuldu: E05 - Sensör Hatası')">E05 - Optik Okuyucu Hatası</button>
        <button class="error-btn" onclick="alert('WhatsApp Destek Hattına Yönlendiriliyorsunuz...')">WhatsApp Destek Al</button>
    </div>

    <script>
        const machines = {
            "MIZRAK-001": { model: "MZK 3800 Diamond", sn: "3800-01", status: "Garanti Aktif" },
            "MIZRAK-002": { model: "MZK 3800 Gold", sn: "3800-02", status: "Garanti Aktif" },
            "MIZRAK-003": { model: "MZK 3200 Special", sn: "3200-01", status: "Servis Gerekli" },
            "MIZRAK-004": { model: "MZK 2500 Edge", sn: "2500-44", status: "Garanti Aktif" },
            "MIZRAK-005": { model: "Mızrak Panel Ebatlama", sn: "PE-99", status: "Bakım Yapıldı" }
        };

        function onScanSuccess(decodedText) {
            const machine = machines[decodedText];
            if (machine) {
                document.getElementById('machine-name').innerText = machine.model;
                document.getElementById('serial-no').innerText = machine.sn;
                document.getElementById('status').innerText = machine.status;
                document.getElementById('result').style.display = 'block';
                // Okuma başarılı olunca kamerayı durdurabiliriz
                html5QrcodeScanner.clear();
            } else {
                alert("Tanımlanamayan QR Kod: " + decodedText + "\nLütfen Mızrak QR kodlarını kullanın.");
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
